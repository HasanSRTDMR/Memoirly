name: memoirly
description: Private journaling app — The Archive (Memoirly).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  equatable: ^2.0.7
  intl: ^0.20.2
  google_fonts: ^6.2.1
  share_plus: ^10.1.3
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  crypto: ^3.0.6
  uuid: ^4.5.1
  collection: ^1.19.0
  image_picker: ^1.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0

flutter_launcher_icons:
  android: true
  ios: true
  # Önce: dart run tool/compose_launcher_icon.dart (logom.png → logom_launcher.png)
  image_path: assets/images/logom_launcher.png
  # Bitmap arka plan: bazı Android launcher’lar @color ile hatalı çizer.
  adaptive_icon_background: assets/images/ic_launcher_adaptive_bg.png
  # Şeffaf zeminli ön plan: daire içinde tek renk #F6EFE2 arka plandan gelir (beyaz halka yok).
  adaptive_icon_foreground: assets/images/logom_android_fg.png
  # Ek güvenli alan; çizim zaten compose ile %72 ölçekli.
  adaptive_icon_foreground_inset: 18
  remove_alpha_ios: true
  background_color_ios: "#F6EFE2"
  web:
    generate: true
    image_path: assets/images/logom_launcher.png
    background_color: "#F6EFE2"
    theme_color: "#F6EFE2"
  macos:
    generate: true
    image_path: assets/images/logom_launcher.png
  windows:
    generate: true
    image_path: assets/images/logom_launcher.png

flutter:
  uses-material-design: true
  generate: true
