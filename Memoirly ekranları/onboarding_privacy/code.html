<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500;1,6..72,600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-soft-gradient {
            background: radial-gradient(circle at 50% 50%, #fde7d3 0%, #f9f9f7 70%);
        }
        .abstract-blob {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-bright": "#f9f9f7",
                "tertiary-dim": "#5f5142",
                "surface-tint": "#5f5e5e",
                "surface-dim": "#d4dcd8",
                "error-container": "#fe8983",
                "primary-fixed-dim": "#d6d4d3",

                "on-tertiary-fixed": "#504234",
                "secondary-container": "#dfe5cf",
                "on-surface": "#2d3432",
                "on-primary-fixed": "#403f3f",
                "primary-dim": "#535252",
                "tertiary-fixed-dim": "#eed9c6",
                "on-background": "#2d3432",
                "inverse-primary": "#ffffff",
                "tertiary": "#6c5c4d",
                "on-secondary-fixed": "#3c4131",
                "primary-container": "#e5e2e1",
                "outline": "#767c79",
                "tertiary-container": "#fde7d3",
                "surface-variant": "#dee4e0",
                "secondary-fixed-dim": "#d1d7c1",
                "tertiary-fixed": "#fde7d3",
                "secondary-fixed": "#dfe5cf",
                "on-primary-container": "#525151",
                "on-tertiary-fixed-variant": "#6d5e4f",
                "secondary-dim": "#4f5544",
                "surface-container": "#ecefec",
                "surface-container-lowest": "#ffffff",
                "on-tertiary": "#fff7f3",
                "on-secondary": "#f6fce5",
                "on-primary": "#faf7f6",
                "on-secondary-fixed-variant": "#585e4c",
                "inverse-on-surface": "#9c9d9b",
                "on-error-container": "#752121",
                "on-secondary-container": "#4e5443",
                "primary-fixed": "#e5e2e1",
                "background": "#f9f9f7",
                "secondary": "#5b6150",
                "surface-container-high": "#e5e9e6",
                "outline-variant": "#adb3b0",
                "error-dim": "#4e0309",
                "on-surface-variant": "#5a605e",
                "on-tertiary-container": "#635445",
                "surface-container-highest": "#dee4e0",
                "surface-container-low": "#f2f4f2"
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Newsreader"],
                "label": ["Manrope"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-label antialiased overflow-hidden">
<!-- Screen Shell: Onboarding (Suppresses Nav Shell as per instructions for linear/task-focused journeys) -->
<main class="relative h-screen w-full flex flex-col items-center justify-between px-8 py-16 md:px-16 md:py-24">
<!-- Top Branding Anchor -->
<header class="w-full flex justify-center mb-8">
<span class="font-body italic text-2xl text-primary tracking-tight">The Archive</span>
</header>
<!-- Central Editorial Content -->
<section class="flex-1 w-full max-w-2xl flex flex-col items-center justify-center text-center">
<!-- Hero Visual: Asymmetric Abstract Shape -->
<div class="relative mb-16 md:mb-24 w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- Background Glow -->
<div class="absolute inset-0 bg-tertiary-container/30 blur-3xl rounded-full"></div>
<!-- Main Abstract Shape (Linen texture feel via gradient/opacity) -->
<div class="abstract-blob w-full h-full bg-tertiary-container/60 shadow-[0_24px_48px_-12px_rgba(108,92,77,0.08)] flex items-center justify-center">
<img alt="Soft organic minimal shape" class="w-48 h-48 md:w-64 md:h-64 object-cover abstract-blob opacity-80 mix-blend-multiply grayscale" data-alt="Minimalist top-down view of a single smooth pebble on a bed of fine white sand with soft natural shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAd2X7xKPMeV7m9Q18nLy_dXIoknBCMEKFpJy4-3toYVRXm44taRD4N9HrZ7IUVBF-wlizLxThI2RweF2e05kP2offX1X3OMPXf1EULEujXeF7HN1_KaLqX1V_UCk-KghWGR68TcK9egZRu9px-vGwAc-Q4ZSEQzFntNbEAENVBngqy9xqeGmuigtG6JawwGqqrgSzRFQmV9llhNXHn4mAfklKJURbNJxBBoxmkciT3zDLT0lEwtCIHUYAHdkxrY-lHUpQ-yIynWyLK"/>
</div>
</div>
<!-- Typography Hierarchy -->
<div class="space-y-6">
<h1 class="font-body italic text-4xl md:text-6xl text-on-surface leading-tight tracking-tight">
                    Your thoughts. <br/>Only yours.
                </h1>
<p class="font-label text-on-surface-variant text-sm md:text-base tracking-[0.1em] uppercase">
                    No cloud. No tracking. Just you.
                </p>
</div>
</section>
<!-- Footer Actions & Pagination -->
<footer class="w-full max-w-md flex flex-col items-center gap-12">
<!-- 3-Dot Slide Indicator -->
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-variant"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-variant"></div>
</div>
<!-- Navigation Buttons -->
<div class="w-full flex flex-col sm:flex-row items-center justify-between gap-6">
<button class="font-label text-sm font-semibold text-outline hover:text-primary transition-colors duration-300 px-4 py-2">
                    SKIP
                </button>
<button class="group flex items-center gap-3 bg-primary text-on-primary px-8 py-4 rounded-full font-label font-bold tracking-wide hover:bg-primary-dim active:scale-95 transition-all duration-300">
<span>NEXT</span>
<span class="material-symbols-outlined text-lg" data-icon="east">east</span>
</button>
</div>
</footer>
</main>
<!-- Contextual "Privacy First" Tag (Floating) -->
<div class="fixed top-8 right-8 hidden lg:flex items-center gap-2 bg-secondary-container/50 backdrop-blur-sm px-4 py-2 rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[18px] text-on-secondary-container" data-icon="verified_user">verified_user</span>
<span class="font-label text-[10px] font-bold tracking-widest uppercase text-on-secondary-container">Local Storage Only</span>
</div>
</body></html>
