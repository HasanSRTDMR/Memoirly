<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Archive - Security</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500;1,6..72,600;1,6..72,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom subtle glass/tonal effects based on Design System */
        .glass-panel {
            background: rgba(249, 249, 247, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f9f9f7",
                        "tertiary-dim": "#5f5142",
                        "surface-tint": "#5f5e5e",
                        "surface-dim": "#d4dcd8",
                        "error-container": "#fe8983",
                        "primary-fixed-dim": "#d6d4d3",
                        "inverse-surface": "#0d0f0e",
                        "surface": "#f9f9f7",
                        "error": "#9f403d",
                        "on-error": "#fff7f6",
                        "primary": "#5f5e5e",
                        "on-primary-fixed-variant": "#5c5b5b",
                        "on-tertiary-fixed": "#504234",
                        "secondary-container": "#dfe5cf",
                        "on-surface": "#2d3432",
                        "on-primary-fixed": "#403f3f",
                        "primary-dim": "#535252",
                        "tertiary-fixed-dim": "#eed9c6",
                        "on-background": "#2d3432",
                        "inverse-primary": "#ffffff",
                        "tertiary": "#6c5c4d",
                        "on-secondary-fixed": "#3c4131",
                        "primary-container": "#e5e2e1",
                        "outline": "#767c79",
                        "tertiary-container": "#fde7d3",
                        "surface-variant": "#dee4e0",
                        "secondary-fixed-dim": "#d1d7c1",
                        "tertiary-fixed": "#fde7d3",
                        "secondary-fixed": "#dfe5cf",
                        "on-primary-container": "#525151",
                        "on-tertiary-fixed-variant": "#6d5e4f",
                        "secondary-dim": "#4f5544",
                        "surface-container": "#ecefec",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#fff7f3",
                        "on-secondary": "#f6fce5",
                        "on-primary": "#faf7f6",
                        "on-secondary-fixed-variant": "#585e4c",
                        "inverse-on-surface": "#9c9d9b",
                        "on-error-container": "#752121",
                        "on-secondary-container": "#4e5443",
                        "primary-fixed": "#e5e2e1",
                        "background": "#f9f9f7",
                        "secondary": "#5b6150",
                        "surface-container-high": "#e5e9e6",
                        "outline-variant": "#adb3b0",
                        "error-dim": "#4e0309",
                        "on-surface-variant": "#5a605e",
                        "on-tertiary-container": "#635445",
                        "surface-container-highest": "#dee4e0",
                        "surface-container-low": "#f2f4f2"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Newsreader"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-label overflow-hidden selection:bg-secondary-container">
<!-- Top Navigation Anchor (Shared Component: TopAppBar) -->
<!-- Note: Following "Destination" Rule, TopAppBar is kept simple as it is a focus-locked screen -->
<header class="fixed top-0 left-0 w-full px-6 py-12 flex flex-col items-center justify-center z-50">
<h1 class="font-['Newsreader'] italic text-4xl tracking-tight text-stone-900 leading-none">The Archive</h1>
<p class="font-['Manrope'] text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant mt-4 opacity-60">Private Sanctuary</p>
</header>
<!-- Main Content: Security Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-12">
<!-- Status / Instruction -->
<div class="mb-16 text-center">
<h2 class="font-['Newsreader'] italic text-2xl text-on-surface mb-2">Welcome back</h2>
<p class="font-['Manrope'] text-sm text-on-surface-variant">Enter passcode to unlock your thoughts</p>
</div>
<!-- PIN Indicator Section -->
<div class="flex space-x-6 mb-16">
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
</div>
<!-- Numeric Pin Pad: Asymmetric/Editorial Layout -->
<div class="grid grid-cols-3 gap-y-8 gap-x-12 max-w-xs mx-auto">
<!-- Row 1 -->
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">1</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">2</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">3</button>
<!-- Row 2 -->
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">4</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">5</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">6</button>
<!-- Row 3 -->
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">7</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">8</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">9</button>
<!-- Row 4 -->
<button class="w-16 h-16 flex items-center justify-center rounded-full text-sm font-['Manrope'] font-bold text-on-surface-variant/60 uppercase tracking-widest hover:text-primary transition-colors duration-200">Face ID</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-2xl font-['Manrope'] font-medium text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">0</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-primary hover:bg-surface-container-low transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
</main>
<!-- Biometric Trigger (Editorial Floating Element) -->
<div class="fixed bottom-16 left-0 w-full flex flex-col items-center">
<button class="group flex flex-col items-center gap-4 focus:outline-none">
<div class="p-6 rounded-full bg-surface-container-low group-active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="faceid" style="font-variation-settings: 'wght' 200;">face</span>
</div>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Use Biometrics</span>
</button>
</div>
<!-- Background Subtle Textures/Gradients -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<!-- Top Soft Gradient -->
<div class="absolute top-0 left-0 w-full h-[353px] bg-gradient-to-b from-surface-container-low/50 to-transparent"></div>
<!-- Stylized Decorative Element -->
<div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full bg-secondary-container/10 blur-[100px]"></div>
<div class="absolute top-1/4 -left-24 w-64 h-64 rounded-full bg-tertiary-container/10 blur-[80px]"></div>
<!-- Subtle Grid Texture (Dotted Paper Feel) -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#2d3432 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</div>
<!-- Optional Footer Links (Low Emphasis) -->
<footer class="fixed bottom-8 w-full px-8 flex justify-between text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/40">
<button class="hover:text-primary transition-colors">Forgot Pin</button>
<button class="hover:text-primary transition-colors">Emergency</button>
</footer>
</body></html>
